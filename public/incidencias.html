<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Incidencias</title>

<style>

body{
    font-family:Arial;
    background:#f5f6fa;
    padding:20px;
}

form{
    background:white;
    padding:20px;
    border-radius:15px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    background:#0057ff;
    color:white;
    border:none;
}

</style>

</head>

<body>

<h1>Nueva incidencia</h1>

<form id="formulario">

<input type="text" id="alumno" placeholder="Alumno" required>

<input type="text" id="dispositivo" placeholder="Dispositivo" required>

<textarea id="descripcion" placeholder="Descripción"></textarea>

<button>Guardar incidencia</button>

</form>

<script>

document.getElementById("formulario")
.addEventListener("submit", async(e)=>{

e.preventDefault();

const datos = {
    alumno:document.getElementById("alumno").value,
    dispositivo:document.getElementById("dispositivo").value,
    descripcion:document.getElementById("descripcion").value
};

const res = await fetch("/incidencias",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify(datos)
});

const data = await res.json();

alert("Incidencia guardada");

});

</script>

</body>
</html>
