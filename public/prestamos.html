<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Préstamos</title>

<style>

body{
    font-family:Arial;
    background:#f5f6fa;
    padding:20px;
}

form{
    background:white;
    padding:20px;
    border-radius:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    background:#0057ff;
    color:white;
    border:none;
}

</style>

</head>

<body>

<h1>Nuevo préstamo</h1>

<form id="formulario">

<input type="text" id="alumno" placeholder="Alumno">

<input type="text" id="dispositivo" placeholder="Dispositivo">

<button>Guardar préstamo</button>

</form>

<script>

document.getElementById("formulario")
.addEventListener("submit", async(e)=>{

e.preventDefault();

const datos = {
    alumno:document.getElementById("alumno").value,
    dispositivo:document.getElementById("dispositivo").value
};

await fetch("/prestamos",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify(datos)
});

alert("Préstamo guardado");

});

</script>

</body>
</html>
